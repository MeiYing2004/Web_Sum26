enum SeatStatus {
  AVAILABLE
  HELD
  BOOKED
  BLOCKED
}

enum BookingStatus {
  DRAFT
  PENDING_PAYMENT
  PAID
  TICKET_ISSUED
  CHECKED_IN
  COMPLETED
  EXPIRED
  CANCELLED
}

enum TripStatus {
  ACTIVE
  INACTIVE
  DEPARTED
  COMPLETED
  CANCELLED
}

type LocationSuggestion {
  id: ID!
  name: String!
  type: String!
}

type TripSummary {
  id: ID!
  routeName: String!
  origin: String!
  destination: String!
  operatorName: String!
  busType: String!
  departureTime: String!
  arrivalTime: String!
  price: Float!
  availableSeats: Int!
  durationMinutes: Int!
  bookable: Boolean!
  availabilityStatus: String!
  availabilityLabel: String!
}

type TripDetail {
  id: ID!
  routeName: String!
  origin: String!
  destination: String!
  pickupPoint: String!
  dropoffPoint: String!
  operatorName: String!
  busType: String!
  departureTime: String!
  arrivalTime: String!
  price: Float!
  cancellationPolicy: String!
  busId: ID!
  busPlate: String!
  totalSeats: Int!
  seatLayoutJson: String
}

type SeatInfo {
  seatId: ID!
  seatLabel: String!
  status: SeatStatus!
  heldBy: String
  holdTtlSeconds: Int
}

type SeatMap {
  tripId: ID!
  busLayout: String!
  layoutJson: String!
  seats: [SeatInfo!]!
}

type HoldSeatsResult {
  success: Boolean!
  holdToken: String
  expiresInSeconds: Int
  message: String!
  failedSeats: [String!]!
}

type Passenger {
  fullName: String!
  phone: String!
  email: String!
  idNumber: String
  seatId: ID!
}

input PassengerInput {
  fullName: String!
  phone: String!
  email: String!
  idNumber: String
  seatId: ID!
}

type BookingResult {
  bookingId: ID!
  bookingCode: String!
  status: BookingStatus!
  totalAmount: Float!
  paymentDeadlineSeconds: Int!
}

type BookingDetail {
  id: ID!
  bookingCode: String!
  status: BookingStatus!
  tripId: ID!
  totalAmount: Float!
  passengers: [Passenger!]!
  createdAt: String!
  routeName: String
  origin: String
  destination: String
  operatorName: String
  pickupPoint: String
  dropoffPoint: String
  departureTime: String
  busPlate: String
  paymentStatus: String
  guestEmail: String
  userId: ID
}

type PaymentResult {
  success: Boolean!
  message: String!
  bookingId: ID
  bookingCode: String
}

type ETicket {
  id: ID!
  ticketCode: String!
  bookingId: ID!
  bookingCode: String!
  tripId: ID!
  passengerName: String!
  passengerPhone: String!
  passengerEmail: String!
  seatId: ID!
  routeName: String!
  origin: String!
  destination: String!
  operatorName: String!
  pickupPoint: String!
  dropoffPoint: String!
  departureTime: String!
  busPlate: String!
  totalAmount: Float!
  paymentStatus: String!
  bookingStatus: String!
  qrCode: String!
  createdAt: String!
}

type AuthResult {
  token: String!
  userId: ID!
  role: String!
}

type SessionInfo {
  valid: Boolean!
  userId: ID
  role: String
}

type SavedPassenger {
  id: ID!
  fullName: String!
  phone: String!
  email: String!
  idNumber: String
}

type DailyRevenue {
  date: String!
  revenue: Float!
  bookingCount: Int!
}

type RevenueSummary {
  daily: [DailyRevenue!]!
  totalRevenue: Float!
}

type RouteStat {
  origin: String!
  destination: String!
  searchCount: Int!
}

type RouteCatalogRoute {
  origin: String!
  destination: String!
  tripsCount: Int!
  minPrice: Float!
  durationMinutes: Int!
  nextDepartureTime: String!
}

type RouteCatalog {
  locations: [String!]!
  routes: [RouteCatalogRoute!]!
}

type ConversionRate {
  totalSearches: Int!
  totalBookings: Int!
  conversionRate: Float!
}

type AdminRankItem {
  name: String!
  subtitle: String!
  count: Int!
  revenue: Float!
}

type AdminOrderRow {
  ticketCode: String!
  bookingCode: String!
  customerName: String!
  routeName: String!
  origin: String!
  destination: String!
  seatId: String!
  totalAmount: Float!
  status: String!
  createdAt: String!
}

type AdminEventLog {
  id: ID!
  bookingId: ID!
  bookingCode: String!
  eventType: String!
  detail: String!
  createdAt: String!
}

type AdminStats {
  totalRevenue: Float!
  ticketsSold: Int!
  customers: Int!
  activeTrips: Int!
  conversionRate: Float!
  totalSearches: Int!
  totalBookings: Int!
}

type AdminDashboard {
  stats: AdminStats!
  revenue7Days: [DailyRevenue!]!
  revenue30Days: [DailyRevenue!]!
  topRoutes: [AdminRankItem!]!
  topOperators: [AdminRankItem!]!
  topCustomers: [AdminRankItem!]!
  recentOrders: [AdminOrderRow!]!
}

# ─── Admin CRUD types ───────────────────────────────────────

type AdminRouteStop {
  id: ID!
  name: String!
  order: Int!
}

type AdminRoute {
  id: ID!
  name: String!
  origin: String!
  destination: String!
  stops: [AdminRouteStop!]!
  createdAt: String!
}

type AdminRouteList {
  routes: [AdminRoute!]!
  total: Int!
}

type AdminStop {
  id: ID!
  routeId: ID!
  routeName: String!
  name: String!
  order: Int!
}

type AdminStopList {
  stops: [AdminStop!]!
  total: Int!
}

type AdminBus {
  id: ID!
  plate: String!
  busType: String!
  seatCount: Int!
  layoutType: String!
  seatLayoutJson: String!
  operatorId: ID!
  operatorName: String!
}

type AdminBusList {
  buses: [AdminBus!]!
  total: Int!
}

type AdminOperator {
  id: ID!
  name: String!
}

type AdminTrip {
  id: ID!
  routeId: ID!
  routeName: String!
  origin: String!
  destination: String!
  busId: ID!
  busPlate: String!
  busType: String!
  operatorId: ID!
  operatorName: String!
  departureTime: String!
  arrivalTime: String!
  price: Float!
  status: TripStatus!
  pickupPoint: String!
  dropoffPoint: String!
  cancellationPolicy: String!
}

type AdminTripList {
  trips: [AdminTrip!]!
  total: Int!
}

type DeleteResult {
  success: Boolean!
}

type AdminBookingList {
  bookings: [BookingDetail!]!
  total: Int!
}

type SeatUpdate {
  tripId: ID!
  seatId: ID!
  status: SeatStatus!
  heldBy: String
  holdTtlSeconds: Int
}

type Query {
  health: String!
  session: SessionInfo!
  savedPassengers: [SavedPassenger!]!
  autocompleteLocations(query: String!): [LocationSuggestion!]!
  searchTrips(
    origin: String!
    destination: String!
    travelDate: String!
    operatorFilter: String
    busTypeFilter: String
    minPrice: Float
    maxPrice: Float
    departureTimeFrom: String
    departureTimeTo: String
    minSeats: Int
    sortBy: String
  ): [TripSummary!]!
  tripDetail(tripId: ID!): TripDetail
  seatMap(tripId: ID!): SeatMap!
  booking(id: ID!): BookingDetail
  bookingByCode(bookingCode: String!, email: String): BookingDetail
  myBookings: [BookingDetail!]!
  myTickets(search: String, filter: String, email: String): [ETicket!]!
  ticketsForBooking(bookingId: ID!, email: String): [ETicket!]!
  ticket(id: ID!): ETicket
  searchTickets(query: String!, email: String, filter: String): [ETicket!]!
  suggestNearestDate(origin: String!, destination: String!, travelDate: String!): String
  routeCatalog(travelDate: String!, limit: Int): RouteCatalog!
  revenueSummary(fromDate: String, toDate: String): RevenueSummary!
  popularRoutes(limit: Int): [RouteStat!]!
  conversionRate: ConversionRate!
  adminDashboard: AdminDashboard!

  # Admin read — ADMIN + STAFF
  adminRoutes(search: String, page: Int, pageSize: Int): AdminRouteList!
  adminRoute(id: ID!): AdminRoute
  adminStops(routeId: ID, search: String, page: Int, pageSize: Int): AdminStopList!
  adminBuses(search: String, operatorId: ID, page: Int, pageSize: Int): AdminBusList!
  adminTrips(
    routeId: ID
    status: TripStatus
    search: String
    fromDate: String
    toDate: String
    page: Int
    pageSize: Int
  ): AdminTripList!
  adminOperators: [AdminOperator!]!
  adminBookingsByTrip(tripId: ID!, search: String, page: Int, pageSize: Int): AdminBookingList!
  adminEventLogs(limit: Int): [AdminEventLog!]!
}

type Mutation {
  register(email: String!, password: String!, fullName: String!): AuthResult!
  login(email: String!, password: String!, fullName: String): AuthResult!
  holdSeats(tripId: ID!, seatIds: [ID!]!, sessionId: String!): HoldSeatsResult!
  releaseSeats(tripId: ID!, seatIds: [ID!]!, holdToken: String!): Boolean!
  createBooking(
    tripId: ID!
    holdToken: String!
    passengers: [PassengerInput!]!
    guestEmail: String!
  ): BookingResult!
  processPayment(bookingId: ID!, simulateSuccess: Boolean!): PaymentResult!
  cancelBooking(bookingId: ID!): PaymentResult!
  checkIn(bookingCode: String!, ticketId: String): PaymentResult!
  blockSeats(tripId: ID!, seatIds: [ID!]!, blocked: Boolean!): Boolean!
  updateBusSeatLayout(busLayoutType: String!, layoutJson: String!): Boolean!

  # Admin CRUD — ADMIN only
  createRoute(name: String!, origin: String!, destination: String!): AdminRoute!
  updateRoute(id: ID!, name: String!, origin: String!, destination: String!): AdminRoute!
  deleteRoute(id: ID!): DeleteResult!
  createStop(routeId: ID!, name: String!, order: Int!): AdminStop!
  updateStop(id: ID!, name: String!, order: Int!): AdminStop!
  deleteStop(id: ID!): DeleteResult!
  createBus(
    plate: String!
    busType: String!
    seatCount: Int!
    layoutType: String!
    operatorId: ID!
    seatLayoutJson: String
  ): AdminBus!
  updateBus(
    id: ID!
    plate: String!
    busType: String!
    seatCount: Int!
    layoutType: String!
    operatorId: ID!
    seatLayoutJson: String
  ): AdminBus!
  deleteBus(id: ID!): DeleteResult!
  createTrip(
    routeId: ID!
    busId: ID!
    operatorId: ID!
    departureTime: String!
    arrivalTime: String!
    price: Float!
    pickupPoint: String!
    dropoffPoint: String!
    cancellationPolicy: String
    status: TripStatus
  ): AdminTrip!
  updateTrip(
    id: ID!
    routeId: ID
    busId: ID
    operatorId: ID
    departureTime: String
    arrivalTime: String
    price: Float
    pickupPoint: String
    dropoffPoint: String
    cancellationPolicy: String
    status: TripStatus
  ): AdminTrip!
  deleteTrip(id: ID!): DeleteResult!
}

type Subscription {
  seatUpdated(tripId: ID!): SeatUpdate!
}
