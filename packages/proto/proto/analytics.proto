syntax = "proto3";

package bus.analytics.v1;

option java_multiple_files = true;

service AnalyticsService {
  rpc GetRevenueSummary(RevenueSummaryRequest) returns (RevenueSummaryResponse);
  rpc GetPopularRoutes(PopularRoutesRequest) returns (PopularRoutesResponse);
  rpc GetConversionRate(ConversionRateRequest) returns (ConversionRateResponse);
  rpc GetTicketsSoldByRoute(TicketsByRouteRequest) returns (TicketsByRouteResponse);
}

message RevenueSummaryRequest {
  optional string from_date = 1;
  optional string to_date = 2;
}

message DailyRevenue {
  string date = 1;
  double revenue = 2;
  int32 booking_count = 3;
}

message RevenueSummaryResponse {
  repeated DailyRevenue daily = 1;
  double total_revenue = 2;
}

message PopularRoutesRequest {
  int32 limit = 1;
}

message RouteStat {
  string origin = 1;
  string destination = 2;
  int32 search_count = 3;
}

message PopularRoutesResponse {
  repeated RouteStat routes = 1;
}

message ConversionRateRequest {
  optional string from_date = 1;
  optional string to_date = 2;
}

message ConversionRateResponse {
  int32 total_searches = 1;
  int32 total_bookings = 2;
  double conversion_rate = 3;
}

message TicketsByRouteRequest {
  optional string from_date = 1;
  optional string to_date = 2;
}

message RouteTicketStat {
  string route_name = 1;
  int32 tickets_sold = 2;
  double revenue = 3;
}

message TicketsByRouteResponse {
  repeated RouteTicketStat routes = 1;
}
