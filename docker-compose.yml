services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bus
      POSTGRES_PASSWORD: bus123
      POSTGRES_DB: bus_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "10"]
      interval: 5s
      timeout: 15s
      retries: 12

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 18
      start_period: 45s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: bus
      RABBITMQ_DEFAULT_PASS: bus123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 90s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - web
      - ai-service

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_NAME: api-gateway
      PORT: 4000
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      TRIP_SERVICE_URL: trip-service:50053
      SEAT_SERVICE_URL: seat-inventory-service:50054
      BOOKING_SERVICE_URL: booking-service:50055
      AUTH_SERVICE_URL: auth-service:50051
      USER_SERVICE_URL: user-service:50052
      PAYMENT_SERVICE_URL: payment-service:50056
      TICKET_SERVICE_URL: ticket-service:50057
      AI_SERVICE_URL: http://ai-service:8765
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  trip-service:
    build:
      context: .
      dockerfile: services/trip-service/Dockerfile
    environment:
      SERVICE_NAME: trip-service
      HEALTH_PORT: 9103
      DATABASE_URL: postgresql://bus_trip:bus123@postgres:5432/bus_trip
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      GRPC_PORT: 50053
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  seat-inventory-service:
    build:
      context: .
      dockerfile: services/seat-inventory-service/Dockerfile
    environment:
      SERVICE_NAME: seat-inventory-service
      HEALTH_PORT: 9104
      REDIS_URL: redis://redis:6379
      GRPC_PORT: 50054
      KAFKA_BROKERS: kafka:29092
    ports:
      - "50054:50054"
    depends_on:
      redis:
        condition: service_healthy

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    environment:
      SERVICE_NAME: booking-service
      HEALTH_PORT: 9105
      DATABASE_URL: postgresql://bus_booking:bus123@postgres:5432/bus_booking
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://bus:bus123@rabbitmq:5672
      KAFKA_BROKERS: kafka:29092
      GRPC_PORT: 50055
      TRIP_SERVICE_URL: trip-service:50053
      SEAT_SERVICE_URL: seat-inventory-service:50054
      PAYMENT_SERVICE_URL: payment-service:50056
      TICKET_SERVICE_URL: ticket-service:50057
    ports:
      - "50055:50055"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    environment:
      SERVICE_NAME: payment-service
      HEALTH_PORT: 9106
      DATABASE_URL: postgresql://bus_payment:bus123@postgres:5432/bus_payment
      KAFKA_BROKERS: kafka:29092
      GRPC_PORT: 50056
    ports:
      - "50056:50056"
    depends_on:
      postgres:
        condition: service_healthy

  ticket-service:
    build:
      context: .
      dockerfile: services/ticket-service/Dockerfile
    environment:
      SERVICE_NAME: ticket-service
      HEALTH_PORT: 9107
      GRPC_PORT: 50057
      DATABASE_URL: postgresql://bus_ticket:bus123@postgres:5432/bus_ticket
      RABBITMQ_URL: amqp://bus:bus123@rabbitmq:5672
      BOOKING_SERVICE_URL: booking-service:50055
      TRIP_SERVICE_URL: trip-service:50053
      REDIS_URL: redis://redis:6379
    ports:
      - "50057:50057"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      SERVICE_NAME: notification-service
      HEALTH_PORT: 9108
      RABBITMQ_URL: amqp://bus:bus123@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      SERVICE_NAME: auth-service
      HEALTH_PORT: 9101
      DATABASE_URL: postgresql://bus_auth:bus123@postgres:5432/bus_auth
      BUS_USER_DATABASE_URL: postgresql://bus_user:bus123@postgres:5432/bus_user
      JWT_SECRET: bus-booking-jwt-secret-change-in-prod
      GRPC_PORT: 50051
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      SERVICE_NAME: user-service
      HEALTH_PORT: 9102
      DATABASE_URL: postgresql://bus_user:bus123@postgres:5432/bus_user
      GRPC_PORT: 50052
    depends_on:
      postgres:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    environment:
      SERVICE_NAME: analytics-service
      HEALTH_PORT: 9109
      DATABASE_URL: postgresql://bus_analytics:bus123@postgres:5432/bus_analytics
      KAFKA_BROKERS: kafka:29092
      GRPC_PORT: 50059
    ports:
      - "50059:50059"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    environment:
      PORT: 8765
      API_GATEWAY_URL: http://api-gateway:4000/graphql
      TRIP_SERVICE_URL: trip-service:50053
      BOOKING_SERVICE_URL: booking-service:50055
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8765:8765"
    depends_on:
      - api-gateway
      - trip-service
      - booking-service

  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    environment:
      PORT: 3100
      REDIS_URL: redis://redis:6379
      MCP_API_KEY: ${MCP_API_KEY:-bus-mcp-demo-key}
      MCP_ROLE: ${MCP_ROLE:-admin}
      API_GATEWAY_URL: http://api-gateway:4000/graphql
      ANALYTICS_SERVICE_URL: analytics-service:50059
    ports:
      - "3100:3100"
    depends_on:
      - api-gateway
      - redis
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:4000/graphql
      NEXT_PUBLIC_WS_URL: ws://localhost:4000/graphql
      API_GATEWAY_URL: http://api-gateway:4000
      AI_SERVICE_URL: http://ai-service:8765
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
      - ai-service

volumes:
  postgres_data:
